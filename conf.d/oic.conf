server {
    listen 80;
    server_name oic.cg www.oic.cg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name oic.cg www.oic.cg;

    ssl_certificate /etc/letsencrypt/live/oic.cg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oic.cg/privkey.pem;

    client_max_body_size 50M;

    location /static/ {
        alias /srv/oic/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/oic/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://oic-web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}